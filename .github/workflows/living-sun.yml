# The Living Sun: refresh live artifacts + deploy the site to GitHub Pages.
#
# Runs every 20 minutes (the sun updates ~every 15), on push to main, and on
# demand. Public-repo Actions minutes are free, so the cadence costs nothing.
# The ONNX model comes from the "model" release, not git history.

name: living-sun

on:
  schedule:
    - cron: '*/20 * * * *'
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: worker/requirements.txt

      - name: Install worker dependencies
        run: pip install -r worker/requirements.txt

      - name: Download ONNX model from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release download model --pattern unet.onnx --dir checkpoints

      - name: Run inference on the latest sun
        run: python -m worker.run

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Build site
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

      - id: deployment
        uses: actions/deploy-pages@v4
